<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

<body>

    <script>


        //le computer fait un choix entre rock papier et ciseaux

        const computerTurn = () => {
            const number = Math.floor(Math.random()*3)

            if (number === 0)
                return "rock"
            else if (number === 1)
                return "paper"
            else
                return "scissors"
        };

        //je cree les variables pour le score des deux

        let humanScore = 0
        let computerScore = 0


        //je cree la fonction pour determiner qui gagne et ce que ca va return

        const whoWins = (player,computer) => {
            if (player === computer){
            console.log("draw")}

            else if (player === "rock" && computer === "scissors" ||
                     player === "paper" && computer === "rock" ||
                     player === "scissors" && computer === "paper"){
                     console.log("you win!")
                     humanScore++}
            else {
                console.log("you lost retard")
                computerScore++
            }
        }

        // Avant j'avais player input et computer selection en dehors de la fonction
        // pis ca marchait pas, jai pas trop compris le pourquoi mais je les ai mit
        // dedans et maintenant ca marche alors, gg?

        const playGame = () =>{
        let playerInput = prompt("Entrez rock, paper ou scissors").toLowerCase()
        let computerSelection = computerTurn()
        whoWins(playerInput,computerSelection)
        console.log("you chose: " + playerInput)
        console.log("the computer chose: " + computerSelection)
        console.log("your score is: " + humanScore)
        console.log("the computers score is: " + computerScore)
    }
        
        // le loop qui fait rejouer les parties 
        
        for (let i=0; i<5; i++){
            playGame() 
        }

    </script>
